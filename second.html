<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Listings</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
   
/* Background Animation */
.form-section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(270deg,#f8e1e7,#fde8e4,#f7d9ff,#e7f0ff);
background-size:800% 800%;
animation: gradientMove 15s ease infinite;
padding:40px;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Glass Card */
.form-card{
width:100%;
max-width:500px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
box-shadow:0 15px 40px rgba(0,0,0,0.1);
border:1px solid rgba(255,255,255,0.4);
animation: floatCard 6s ease-in-out infinite;
}

@keyframes floatCard{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.form-title{
text-align:center;
font-size:28px;
font-weight:600;
margin-bottom:10px;
}

.form-sub{
text-align:center;
font-size:14px;
opacity:0.7;
margin-bottom:30px;
}

/* Input Group */
.input-group{
position:relative;
margin-bottom:25px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:14px 12px;
border-radius:10px;
border:none;
outline:none;
font-size:14px;
background:rgba(255,255,255,0.6);
transition:0.3s;
}

.input-group textarea{
resize:none;
height:120px;
}

/* Floating Label */
.input-group label{
position:absolute;
left:12px;
top:14px;
font-size:13px;
color:#666;
transition:0.3s;
pointer-events:none;
}

.input-group input:focus,
.input-group textarea:focus{
background:white;
box-shadow:0 0 10px rgba(255,120,150,0.3);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group textarea:focus + label,
.input-group textarea:not(:placeholder-shown) + label{
top:-8px;
left:10px;
font-size:11px;
background:white;
padding:2px 6px;
border-radius:5px;
}

/* Button */
.submit-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:500;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff7aa2,#ffb6a3);
background-size:200% 200%;
transition:0.4s;
box-shadow:0 8px 20px rgba(255,120,150,0.4);
}

.submit-btn:hover{
background-position:right center;
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(255,120,150,0.5);
}

/* Glow Pulse */
.submit-btn::after{
content:"";
position:absolute;
inset:0;
border-radius:12px;
opacity:0;
box-shadow:0 0 30px rgba(255,120,150,0.8);
transition:0.3s;
}

.submit-btn:hover::after{
opacity:1;
} 
  </style>
</head>
<body>
 <section class="form-section">

<div class="form-card">

<h2 class="form-title">Leave Your Blessings 💌</h2>
<p class="form-sub">Write a message or dua for the couple</p>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="6521941e-11c5-447c-9369-630fca4cbb23">

<div class="input-group">
<input type="text" name="name" required placeholder=" ">
<label>Your Name</label>
</div>

<div class="input-group">
<input type="email" name="email" required placeholder=" ">
<label>Email Address</label>
</div>

<div class="input-group">
<textarea name="message" required placeholder=" "></textarea>
<label>Your Message</label>
</div>

<button type="submit" class="submit-btn">
Send Blessings ✨
</button>

</form>

</div>

</section>
</body>
</html>
